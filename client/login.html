<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | GiftCard Check</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-[#09090b] text-zinc-200 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-zinc-900/50 border border-zinc-800 p-8 rounded-3xl backdrop-blur-xl shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-purple-600/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-shield-halved text-2xl text-purple-500"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">Admin Portal</h2>
            <p class="text-zinc-500 text-sm mt-1">Sign in to manage submissions</p>
        </div>
        <form id="loginForm" class="space-y-4">
            <input id="username" type="text" placeholder="Username"
                class="w-full px-5 py-4 rounded-xl bg-zinc-950 border border-zinc-800 focus:border-purple-500 outline-none transition-all" required>
            <input id="password" type="password" placeholder="Password"
                class="w-full px-5 py-4 rounded-xl bg-zinc-950 border border-zinc-800 focus:border-purple-500 outline-none transition-all" required>
            <p id="errorMsg" class="hidden text-red-400 text-sm text-center"></p>
            <button type="submit" id="submitBtn" class="w-full py-4 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold transition-all shadow-lg shadow-purple-900/20">
                Sign In
            </button>
        </form>
    </div>

    <script>
        const API = 'https://giftcard-check-production.up.railway.app';

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('errorMsg');
            btn.textContent = 'Signing in…';
            btn.disabled = true;
            err.classList.add('hidden');

            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminRole', data.role);
                    window.location.href = 'admin.html';
                } else {
                    err.textContent = 'Invalid credentials. Try again.';
                    err.classList.remove('hidden');
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                }
            } catch (e) {
                err.textContent = 'Could not reach server. Try again.';
                err.classList.remove('hidden');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
