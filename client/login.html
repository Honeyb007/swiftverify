<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftVerify — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --bg:        #0a0f1e;
            --surface:   #111827;
            --surface2:  #1a2235;
            --border:    rgba(0,212,255,0.1);
            --accent:    #00d4ff;
            --accent-dk: #0099bb;
            --accent-lt: rgba(0,212,255,0.08);
            --text:      #f0f4ff;
            --muted:     #6b7fa3;
            --red:       #ef4444;
            --red-lt:    rgba(239,68,68,0.1);
        }

        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        html { -webkit-text-size-adjust:100%; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            position: relative;
        }

        /* Grid background */
        body::before {
            content:'';
            position:fixed; inset:0;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size:50px 50px;
            pointer-events:none;
        }

        /* Glow orb */
        body::after {
            content:'';
            position:fixed;
            top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:600px; height:600px;
            background:radial-gradient(circle, rgba(0,212,255,0.04) 0%, transparent 70%);
            pointer-events:none;
        }

        .login-wrap {
            width:100%; max-width:400px;
            position:relative; z-index:1;
        }

        /* Logo */
        .logo { text-align:center; margin-bottom:2rem; }
        .logo .icon {
            width:60px; height:60px;
            background:linear-gradient(135deg,var(--accent),var(--accent-dk));
            border-radius:16px;
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 0.75rem;
            font-size:1.5rem; color:#0a0f1e;
            box-shadow:0 0 30px rgba(0,212,255,0.3), 0 0 60px rgba(0,212,255,0.1);
        }
        .logo h1 {
            font-family:'Syne',sans-serif; font-weight:800;
            font-size:1.7rem; letter-spacing:-0.03em; color:var(--text);
        }
        .logo h1 span { color:var(--accent); text-shadow:0 0 20px rgba(0,212,255,0.4); }
        .logo p { color:var(--muted); font-size:0.83rem; margin-top:4px; }

        /* Card */
        .login-card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:24px;
            padding:2rem 1.75rem;
            box-shadow:0 0 0 1px rgba(0,212,255,0.05), 0 20px 60px rgba(0,0,0,0.4);
            position:relative; overflow:hidden;
        }

        /* Top cyan line */
        .login-card::before {
            content:'';
            position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .card-title {
            font-family:'Syne',sans-serif; font-weight:700;
            font-size:1.1rem; color:var(--text); margin-bottom:0.25rem;
        }
        .card-sub { color:var(--muted); font-size:0.82rem; margin-bottom:1.5rem; }

        .field { margin-bottom:1rem; }
        .field label {
            display:block; font-size:0.7rem; font-weight:700;
            color:var(--muted); letter-spacing:0.1em;
            text-transform:uppercase; margin-bottom:0.4rem;
        }

        .input-wrap { position:relative; }
        .input-wrap i {
            position:absolute; left:1rem; top:50%;
            transform:translateY(-50%); color:var(--muted); font-size:0.9rem;
        }
        .field input {
            width:100%;
            background:var(--surface2);
            border:1.5px solid var(--border);
            border-radius:12px;
            padding:0.875rem 1rem 0.875rem 2.75rem;
            font-family:'DM Sans',sans-serif;
            font-size:0.95rem; color:var(--text);
            outline:none; transition:border-color 0.2s, box-shadow 0.2s;
            min-height:48px;
        }
        .field input:focus {
            border-color:var(--accent);
            box-shadow:0 0 0 3px rgba(0,212,255,0.1);
        }
        .field input::placeholder { color:rgba(107,127,163,0.4); }

        .error-msg {
            display:none; align-items:center; gap:8px;
            background:var(--red-lt); border:1px solid rgba(239,68,68,0.2);
            color:var(--red); font-size:0.82rem;
            padding:10px 14px; border-radius:10px; margin-bottom:1rem;
        }
        .error-msg.show { display:flex; }

        .submit-btn {
            width:100%;
            background:linear-gradient(135deg,var(--accent),var(--accent-dk));
            color:#0a0f1e;
            font-family:'DM Sans',sans-serif;
            font-size:0.95rem; font-weight:700;
            padding:0.875rem; min-height:50px;
            border-radius:12px; border:none; cursor:pointer;
            transition:all 0.2s;
            display:flex; align-items:center; justify-content:center; gap:8px;
            box-shadow:0 4px 20px rgba(0,212,255,0.2), 0 0 0 1px rgba(0,212,255,0.1);
            -webkit-tap-highlight-color:transparent;
            margin-top:0.25rem;
        }
        .submit-btn:hover  { box-shadow:0 6px 28px rgba(0,212,255,0.35); transform:translateY(-1px); }
        .submit-btn:active { transform:scale(0.98); }
        .submit-btn:disabled { opacity:0.7; cursor:not-allowed; transform:none; }

        .footer-note {
            text-align:center; margin-top:1.5rem;
            font-size:0.73rem; color:var(--muted);
            display:flex; align-items:center; justify-content:center; gap:5px;
        }
        .footer-note i { color:var(--accent); font-size:0.65rem; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="logo">
        <div class="icon"><i class="fa-solid fa-bolt"></i></div>
        <h1>Swift<span>Verify</span></h1>
        <p>Admin Portal</p>
    </div>

    <div class="login-card">
        <h2 class="card-title">Welcome back</h2>
        <p class="card-sub">Sign in to manage submissions</p>

        <div class="error-msg" id="errorMsg">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="errorText">Invalid credentials. Try again.</span>
        </div>

        <div class="field">
            <label>Username</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Enter username" autocomplete="username">
            </div>
        </div>

        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
            </div>
        </div>

        <button class="submit-btn" id="submitBtn" type="button">
            <i class="fa-solid fa-bolt"></i> Sign In
        </button>
    </div>

    <p class="footer-note"><i class="fa-solid fa-lock"></i> Secure admin access only</p>
</div>

<script>
    const API = 'https://www.swiftverify.me'; // ← swap before deploying

    const submitBtn = document.getElementById('submitBtn');
    const errorMsg  = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    ['username','password'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', (e) => {
            if (e.key==='Enter') { e.preventDefault(); submitBtn.click(); }
        });
    });

    submitBtn.addEventListener('click', async function() {
        if (submitBtn.disabled) return;

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            errorText.textContent = 'Please fill in both fields.';
            errorMsg.classList.add('show'); return;
        }

        errorMsg.classList.remove('show');
        submitBtn.disabled  = true;
        submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Signing in…`;

        try {
            const res = await fetch(`${API}/api/auth/login`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminRole',  data.role);
                window.location.href = 'admin.html';
            } else {
                errorText.textContent = 'Invalid credentials. Try again.';
                errorMsg.classList.add('show');
                submitBtn.disabled  = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-bolt"></i> Sign In`;
            }
        } catch(e) {
            errorText.textContent = 'Could not reach server. Try again.';
            errorMsg.classList.add('show');
            submitBtn.disabled  = false;
            submitBtn.innerHTML = `<i class="fa-solid fa-bolt"></i> Sign In`;
        }
    });
</script>
</body>
</html>
